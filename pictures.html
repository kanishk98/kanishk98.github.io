---
title: Pictures
permalink: /pictures/
---

<div id="photos" class="photo-grid">
  {% for photo in site.data.photos %}
  <a class="photo-item" href="#photo-lightbox-{{ forloop.index }}"
       style="--obj-pos: {{ photo.position | default: 'center center' }}">
    <img src="{{ photo.src | relative_url }}"
         alt="{{ photo.alt | default: '' }}"
         loading="lazy">
    {% if photo.alt %}
    <div class="photo-caption">{{ photo.alt }}</div>
    {% endif %}
  </a>
  {% endfor %}
</div>

{% for photo in site.data.photos %}
<div id="photo-lightbox-{{ forloop.index }}" class="photo-lightbox">
  <div class="photo-lightbox-content">
    <img src="{{ photo.src | relative_url }}"
         alt="{{ photo.alt | default: '' }}">
    {% if photo.alt %}
    <div class="photo-lightbox-caption">{{ photo.alt }}</div>
    {% endif %}
  </div>
</div>
{% endfor %}

<script>
  document.addEventListener('DOMContentLoaded', function () {
    const lightboxes = document.querySelectorAll('.photo-lightbox');

    lightboxes.forEach(function (lightbox) {
      lightbox.addEventListener('click', function (event) {
        if (event.target === lightbox) {
          window.location.hash = '#photos';
        }
      });
    });

    document.addEventListener('keydown', function (event) {
      if (event.key === 'Escape' || event.key === 'Esc') {
        if (window.location.hash.startsWith('#photo-lightbox-')) {
          window.location.hash = '#photos';
        }
      }
    });
  });
</script>
