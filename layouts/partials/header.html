<header class="site-header">
  <div class="container">
    {{ if .IsHome }}
      <h1 class="site-title">{{ .Site.Title }}</h1>
      <nav class="nav">
        {{ range .Site.Menus.main }}
        <a href="{{ .URL | relURL }}">{{ .Name }}</a>
        {{ end }}
      </nav>
    {{ else if eq .Kind "page" }}
      <h1 class="site-title">{{ .Title }}</h1>
      <nav class="nav">
        <a href="{{ "/" | relURL }}">home</a>
      </nav>
    {{ end }}
  </div>
</header>
