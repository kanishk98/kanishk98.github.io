<script>
    class MouseTrail {
        constructor() {
            this.paintStrokes = [];
            
            this.canvas = document.createElement('canvas');
            this.canvas.id = 'paint-canvas';
            this.canvas.style.position = 'fixed';
            this.canvas.style.top = '0';
            this.canvas.style.left = '0';
            this.canvas.style.zIndex = '9999';
            this.canvas.style.pointerEvents = 'none';
            this.canvas.width = window.innerWidth;
            this.canvas.height = window.innerHeight;
            document.body.appendChild(this.canvas);
            
            this.ctx = this.canvas.getContext('2d');
            
            window.addEventListener('resize', () => {
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
            });
            
            this.init();
            this.animatePaint();
        }

        detectDesktop() {
            return !/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        }

        init() {
            document.addEventListener('mousemove', (e) => this.onMouseMove(e));
            document.addEventListener('touchmove', (e) => this.onTouchMoveMobile(e), false);
        }

        getRandomColor() {
            const colors = [
                '#FF6B9D', '#C44569', '#FFA502', '#FB6D48',
                '#FF1654', '#00D2FC', '#3A86FF',
                '#FB5607', '#FFBE0B', '#03DAC6', '#FF006E',
                '#00F5FF', '#00FF88', '#FFD700', '#FF4081'
            ];
            return colors[Math.floor(Math.random() * colors.length)];
        }

        onMouseMove(e) {
            this.paintBrushStroke(e.clientX, e.clientY);
        }

        onTouchMoveMobile(e) {
            for (let touch of e.touches) {
                this.paintBrushStroke(touch.clientX, touch.clientY);
            }
        }

        paintBrushStroke(x, y) {
            const brushSize = 15 + Math.random() * 20;
            this.paintStrokes.push({
                x: x,
                y: y,
                size: brushSize,
                color: this.getRandomColor(),
                life: 1,
                createdAt: Date.now(),
                permanent: false
            });
        }

        animatePaint() {
            this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
            
            this.paintStrokes = this.paintStrokes.filter(stroke => {
                const age = Date.now() - stroke.createdAt;
                stroke.life = Math.max(0, 1 - (age / 2000));
                return stroke.life > 0;
            });
            
            this.paintStrokes.forEach(stroke => {
                this.ctx.fillStyle = stroke.color;
                this.ctx.globalAlpha = 0.8 * stroke.life;
                this.ctx.beginPath();
                this.ctx.arc(stroke.x, stroke.y, stroke.size / 2, 0, Math.PI * 2);
                this.ctx.fill();
            });
            
            this.ctx.globalAlpha = 1.0;
            requestAnimationFrame(() => this.animatePaint());
        }
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', () => new MouseTrail());
    } else {
        new MouseTrail();
    }
</script>

<style>
    .trail-particle {
        position: fixed;
        border-radius: 50%;
        background-color: var(--particle-color, #FF6B9D);
        box-shadow: 0 0 10px var(--particle-color, #FF6B9D),
            0 0 20px var(--particle-color, #FF6B9D);
        pointer-events: none;
        transform-origin: center;
        filter: blur(2px);
        opacity: 0.5;
    }
</style>
